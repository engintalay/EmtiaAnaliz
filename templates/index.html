<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EmtiaAnaliz</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EmtiaAnaliz">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
</head>
<body>
<div id="app">
  <!-- Header -->
  <header>
    <span class="logo">📈 EmtiaAnaliz</span>
    <button id="settingsBtn" title="Ayarlar">⚙️</button>
  </header>

  <!-- Ayarlar Paneli -->
  <div id="settingsPanel" style="display:none">
    <div class="settings-box">
      <h3>⚙️ Ayarlar</h3>

      <label>LMStudio URL
        <input id="lmUrl" type="text" value="http://localhost:1234">
      </label>
      <label>Model
        <select id="modelSelect"><option value="">— Model seç —</option></select>
      </label>
      <div class="settings-actions" style="margin-bottom:16px">
        <button id="loadModels">Modelleri Yükle</button>
        <button id="saveSettings">Kaydet</button>
        <button id="clearCacheBtn" style="margin-left:8px">Önbelleği Temizle</button>
        <button id="unregisterSWBtn" style="margin-left:8px">Servis Çalışanını Kaldır</button>
      </div>

      <label style="flex-direction:row;align-items:center;gap:10px;margin-top:4px">
        <input id="thinkingToggle" type="checkbox" style="width:20px;height:20px;accent-color:var(--accent)">
        <span style="color:var(--text);font-size:15px">Düşünme süreci (Thinking)</span>
      </label>

      <hr style="border-color:#2a2a4a;margin-bottom:14px">
      <h3 style="margin-bottom:12px">📐 Analiz Parametreleri</h3>

      <div class="param-grid">
        <label>RSI Periyot<input id="p_rsi" type="number" value="14" min="2" max="100"></label>
        <label>BB Periyot<input id="p_bb" type="number" value="20" min="2" max="100"></label>
        <label>MACD Hızlı<input id="p_mf" type="number" value="12" min="2" max="100"></label>
        <label>MACD Yavaş<input id="p_ms" type="number" value="26" min="2" max="100"></label>
        <label>MACD Sinyal<input id="p_msig" type="number" value="9" min="2" max="100"></label>
        <label>Veri (gün)<input id="p_days" type="number" value="90" min="7" max="730"></label>
      </div>
      <label style="margin-top:10px">EMA Periyotları (virgülle)
        <input id="p_ema" type="text" value="9,21,50" placeholder="9,21,50,200">
      </label>
      <button id="saveParams" style="width:100%;margin-top:12px;padding:12px;border-radius:10px;border:none;background:#2a4a8a;color:#fff;font-size:16px;font-weight:600;cursor:pointer">Parametreleri Kaydet</button>
    </div>
  </div>

  <!-- Sohbet -->
  <div id="chat"></div>

  <!-- Input -->
  <div id="inputArea">
    <input id="csvFile" type="file" accept=".csv" class="hidden">
    <button id="csvBtn" title="CSV Yükle">📎</button>
    <input id="msgInput" type="text" placeholder="BTC analiz et / RSI 21 olsun..." autocomplete="off">
    <button id="sendBtn">Gönder</button>
    <button id="clearCacheMainBtn" title="Önbelleği Temizle" style="margin-left:8px">🧹</button>
    <button id="unregisterSWMainBtn" title="Servis Çalışanını Kaldır" style="margin-left:6px">🚫</button>
  </div>
</div>

<script>
const chat      = document.getElementById('chat');
const msgInput  = document.getElementById('msgInput');
const sendBtn   = document.getElementById('sendBtn');
const settingsBtn   = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const lmUrl     = document.getElementById('lmUrl');
const modelSelect   = document.getElementById('modelSelect');
const csvBtn    = document.getElementById('csvBtn');
const csvFile   = document.getElementById('csvFile');

let selectedFile = null;

// Ayarları yükle
lmUrl.value = localStorage.getItem('lmUrl') || 'http://localhost:1234';
const savedModel = localStorage.getItem('model') || '';

// Kayıtlı modeli select'e ekle (sayfa yenilense de kaybolmasın)
if (savedModel) {
  const opt = document.createElement('option');
  opt.value = savedModel;
  opt.textContent = savedModel;
  opt.selected = true;
  modelSelect.appendChild(opt);
}

// Parametreleri yükle
const PARAM_DEFAULTS = {
  rsi_period: 14, bb_period: 20,
  macd_fast: 12, macd_slow: 26, macd_signal: 9,
  days: 90, ema_periods: [9, 21, 50]
};

function getSavedParams() {
  try {
    const saved = JSON.parse(localStorage.getItem('params') || '{}');
    return { ...PARAM_DEFAULTS, ...saved };
  } catch { return { ...PARAM_DEFAULTS }; }
}

function loadParamUI() {
  const p = getSavedParams();
  document.getElementById('p_rsi').value  = p.rsi_period;
  document.getElementById('p_bb').value   = p.bb_period;
  document.getElementById('p_mf').value   = p.macd_fast;
  document.getElementById('p_ms').value   = p.macd_slow;
  document.getElementById('p_msig').value = p.macd_signal;
  document.getElementById('p_days').value = p.days;
  document.getElementById('p_ema').value  = (p.ema_periods || [9,21,50]).join(',');
}
function getFormParams() {
  return {
    rsi_period:  parseInt(document.getElementById('p_rsi').value)  || 14,
    bb_period:   parseInt(document.getElementById('p_bb').value)   || 20,
    macd_fast:   parseInt(document.getElementById('p_mf').value)   || 12,
    macd_slow:   parseInt(document.getElementById('p_ms').value)   || 26,
    macd_signal: parseInt(document.getElementById('p_msig').value) || 9,
    days:        parseInt(document.getElementById('p_days').value) || 90,
    ema_periods: document.getElementById('p_ema').value.split(',').map(x => parseInt(x.trim())).filter(Boolean),
  };
}
// Thinking toggle başlangıç değeri
document.getElementById('thinkingToggle').checked = localStorage.getItem('thinking') === '1';
loadParamUI();

function openSettings()  { settingsPanel.style.display = 'flex'; }
function closeSettings() { settingsPanel.style.display = 'none'; }

settingsBtn.onclick = () => settingsPanel.style.display === 'flex' ? closeSettings() : openSettings();
settingsPanel.onclick = e => { if (e.target === settingsPanel) closeSettings(); };

document.getElementById('saveSettings').onclick = () => {
  localStorage.setItem('lmUrl', lmUrl.value);
  localStorage.setItem('model', modelSelect.value);
  localStorage.setItem('thinking', document.getElementById('thinkingToggle').checked ? '1' : '0');
  closeSettings();
  addMsg('system', '✅ Ayarlar kaydedildi.');
};

document.getElementById('saveParams').onclick = () => {
  localStorage.setItem('params', JSON.stringify(getFormParams()));
  closeSettings();
  addMsg('system', '✅ Parametreler kaydedildi.');
};

// Cache / Service Worker helpers (for mobile debugging)
function clearAppCache() {
  if ('caches' in window) {
    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))))
      .then(() => addMsg('system', '✅ Tarayıcı önbelleği temizlendi.'))
      .catch(e => addMsg('system', '❌ Önbellek temizleme hatası: ' + (e && e.message)));
  } else {
    addMsg('system', 'Tarayıcı cache API desteği yok.');
  }
}

function unregisterServiceWorkers() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(regs => Promise.all(regs.map(r => r.unregister())))
      .then(() => addMsg('system', '✅ Service Worker kaldırıldı. Lütfen sayfayı yenileyin.'))
      .catch(e => addMsg('system', '❌ Service Worker kaldırılamadı: ' + (e && e.message)));
  } else {
    addMsg('system', 'Tarayıcı Service Worker desteklemiyor.');
  }
}

// Attach events to the new buttons (if present)
document.addEventListener('DOMContentLoaded', () => {
  const cb = document.getElementById('clearCacheBtn');
  if (cb) cb.onclick = () => {
    if (confirm('Tarayıcı önbelleği (Caches) ve service worker kayıtlarını temizlemek istiyor musunuz?')) {
      clearAppCache();
    }
  };
  const ub = document.getElementById('unregisterSWBtn');
  if (ub) ub.onclick = () => {
    if (confirm('Tüm Service Worker kayıtlarını kaldırmak istiyor musunuz? (Sayfayı yenilemeniz gerekebilir)')) {
      unregisterServiceWorkers();
    }
  };
  // main-screen buttons
  const cbm = document.getElementById('clearCacheMainBtn');
  if (cbm) cbm.onclick = () => {
    if (confirm('Tarayıcı önbelleğini temizlemek istiyor musunuz?')) clearAppCache();
  };
  const ubm = document.getElementById('unregisterSWMainBtn');
  if (ubm) ubm.onclick = () => {
    if (confirm('Service Worker kayıtlarını kaldırmak istiyor musunuz?')) unregisterServiceWorkers();
  };
});

document.getElementById('loadModels').onclick = async () => {
  modelSelect.innerHTML = '<option>Yükleniyor...</option>';
  try {
    const res  = await fetch(`/models?base_url=${encodeURIComponent(lmUrl.value)}`);
    const data = await res.json();
    modelSelect.innerHTML = data.models.map(m =>
      `<option value="${m}" ${m === savedModel ? 'selected' : ''}>${m}</option>`
    ).join('');
    if (!data.models.length) modelSelect.innerHTML = '<option>Model bulunamadı</option>';
  } catch { modelSelect.innerHTML = '<option>Bağlantı hatası</option>'; }
};

csvBtn.onclick = () => csvFile.click();
csvFile.onchange = () => {
  selectedFile = csvFile.files[0];
  if (selectedFile) addMsg('system', `📎 ${selectedFile.name} seçildi.`);
};

function addMsg(role, content, isHtml = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (isHtml) div.innerHTML = content;
  else div.textContent = content;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addAnalysis(data) {
  if (data.param_info) addMsg('system', data.param_info);

  // Grafik — iframe ile
  const wrap = document.createElement('div');
  wrap.className = 'msg bot chart-container';
  const iframe = document.createElement('iframe');
  iframe.scrolling = 'no';
  iframe.style.cssText = 'width:100%;height:430px;min-height:430px;flex-shrink:0;border:none;border-radius:8px;background:#16213e;display:block';
  // Use blob URL for src instead of srcdoc so inline scripts run reliably in mobile WebViews/PWAs
  try {
    const blob = new Blob([data.chart], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    iframe.src = url;
    iframe.addEventListener('load', () => {
      try {
        const h = iframe.contentWindow.document.documentElement.scrollHeight;
        if (h > 10) iframe.style.height = h + 'px';
      } catch {}
      // revoke after a short delay to ensure load complete
      setTimeout(() => { try { URL.revokeObjectURL(url); } catch {} }, 1000);
    });
  } catch (e) {
    // Fallback to srcdoc if blob isn't supported
    iframe.srcdoc = data.chart;
    iframe.onload = () => {
      try {
        const h = iframe.contentDocument.documentElement.scrollHeight;
        if (h > 10) iframe.style.height = h + 'px';
      } catch {}
    };
  }
  wrap.appendChild(iframe);
  chat.appendChild(wrap);

  // Göstergeler tablosu
  const ind = data.indicators;
  const p   = data.params || {};
  const emaRows = (p.ema_periods || [9,21,50]).map(ep =>
    `<tr><td>EMA${ep}</td><td>${(ind[`ema${ep}`] || 0).toFixed(4)}</td></tr>`
  ).join('');
  chat.insertAdjacentHTML('beforeend', `
    <div class="msg bot">
      <b>📊 ${data.symbol} Teknik Göstergeler</b>
      <table class="ind-table">
        <tr><td>Fiyat</td><td><b>${ind.fiyat?.toFixed(4)}</b></td></tr>
        <tr><td>RSI (${p.rsi_period||14})</td><td>${ind.rsi} — ${ind.rsi_yorum}</td></tr>
        <tr><td>MACD</td><td>${ind.macd_yorum}</td></tr>
        <tr><td>BB Üst</td><td>${ind.bb_ust || '-'}</td></tr>
        <tr><td>BB Alt</td><td>${ind.bb_alt || '-'}</td></tr>
        ${emaRows}
        <tr><td>Trend</td><td>${ind.trend}</td></tr>
        <tr><td>Destek</td><td>${ind.destek}</td></tr>
        <tr><td>Direnç</td><td>${ind.direnc}</td></tr>
        <tr><td>Hacim</td><td>${ind.hacim_yorum}</td></tr>
      </table>
    </div>`);

  chat.scrollTop = chat.scrollHeight;
}

async function streamLLM(symbol, indicators, baseUrl, model, thinking) {
  // Ana yanıt div
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg bot';

  // Düşünme bloğu (collapsible)
  const thinkWrap = document.createElement('details');
  thinkWrap.className = 'think-block';
  thinkWrap.innerHTML = '<summary>🧠 Düşünüyor...</summary><pre class="think-content"></pre>';
  msgDiv.appendChild(thinkWrap);

  const answerSpan = document.createElement('span');
  answerSpan.className = 'answer-text';
  answerSpan.textContent = '🤖 ';
  msgDiv.appendChild(answerSpan);

  chat.appendChild(msgDiv);
  chat.scrollTop = chat.scrollHeight;

  const form = new FormData();
  form.append('symbol', symbol);
  form.append('base_url', baseUrl);
  form.append('model', model);
  form.append('indicators', JSON.stringify(indicators));
  form.append('thinking', thinking ? 'true' : 'false');

  const res = await fetch('/analyze/stream', { method: 'POST', body: form });
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '', fullText = '', hasThink = false;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data:')) continue;
      const raw = line.slice(5).trim();
      if (raw === '[DONE]') {
        // Düşünme bitti, summary güncelle
        if (hasThink) thinkWrap.querySelector('summary').textContent = '🧠 Düşünme süreci (görmek için tıkla)';
        else thinkWrap.remove();
        return;
      }
      try {
        const obj = JSON.parse(raw);
        if (obj.token) {
          fullText += obj.token;

          // Think içeriğini ayır
          const thinkMatch = fullText.match(/<think>([\s\S]*?)<\/think>/);
          const openThink  = fullText.match(/<think>([\s\S]*)$/);

          if (thinkMatch) {
            hasThink = true;
            thinkWrap.querySelector('.think-content').textContent = thinkMatch[1];
            const answer = fullText.replace(/<think>[\s\S]*?<\/think>/g, '').trimStart();
            answerSpan.textContent = '🤖 ' + answer;
          } else if (openThink) {
            hasThink = true;
            thinkWrap.querySelector('.think-content').textContent = openThink[1];
            answerSpan.textContent = '🤖 ';
          } else {
            answerSpan.textContent = '🤖 ' + fullText.trimStart();
          }

          chat.scrollTop = chat.scrollHeight;
        }
        if (obj.error) answerSpan.textContent += `\n❌ ${obj.error}`;
      } catch {}
    }
  }
}

async function send() {
  const text = msgInput.value.trim();
  if (!text) return;

  const model   = localStorage.getItem('model') || modelSelect.value;
  const baseUrl = localStorage.getItem('lmUrl') || 'http://localhost:1234';
  const thinking = localStorage.getItem('thinking') === '1';

  if (!model) { addMsg('system', '⚠️ Lütfen önce ayarlardan model seçin.'); return; }

  addMsg('user', text);
  inputHistory.unshift(text);  // en başa ekle
  msgInput.value = '';
  historyIdx = -1;
  addMsg('system', '⏳ Veri çekiliyor...');

  const form = new FormData();
  form.append('symbol', text);
  form.append('base_url', baseUrl);
  form.append('model', model);
  form.append('form_params', JSON.stringify(getFormParams()));
  form.append('thinking', thinking ? 'true' : 'false');
  if (selectedFile) { form.append('file', selectedFile); selectedFile = null; csvFile.value = ''; }

  try {
    const res = await fetch('/analyze', { method: 'POST', body: form });
    chat.removeChild(chat.lastChild); // "Veri çekiliyor" kaldır
    const data = await res.json();
    if (data.hata) { addMsg('system', '❌ ' + data.hata); return; }

    addAnalysis(data);

    // LLM stream başlat
    await streamLLM(data.symbol, data.indicators, baseUrl, model, thinking);

  } catch (e) {
    if (chat.lastChild?.textContent?.includes('çekiliyor')) chat.removeChild(chat.lastChild);
    addMsg('system', '❌ Sunucu hatası: ' + e.message);
  }
}

// Input geçmişi
const inputHistory = [];
let historyIdx = -1;

sendBtn.onclick = send;
msgInput.onkeydown = e => {
  if (e.key === 'Enter') { historyIdx = -1; send(); return; }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (inputHistory.length === 0) return;
    historyIdx = Math.min(historyIdx + 1, inputHistory.length - 1);
    msgInput.value = inputHistory[historyIdx];
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    historyIdx = Math.max(historyIdx - 1, -1);
    msgInput.value = historyIdx === -1 ? '' : inputHistory[historyIdx];
  }
};

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');

addMsg('bot', '👋 Merhaba! Sembol yazın veya doğal dil kullanın.\n\nÖrnekler:\n• BTC analiz et\n• AAPL hissesini incele\n• altın analizi, RSI 21 olsun\n• ETH, 180 günlük analiz yap\n\nParametreleri ⚙️ ayarlardan da değiştirebilirsiniz.');
</script>
</body>
</html>
